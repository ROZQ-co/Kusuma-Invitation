<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Trimono & Puji</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Lora&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --navy: #001f3f;
            --gold: #d4af37;
            --white-trans: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lora', serif;
            background: linear-gradient(rgba(0, 31, 63, 0.8), rgba(0, 31, 63, 0.8)), url('background.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: scroll;
            color: white;
            overflow-x: hidden;
        }

        .font-aesthetic { font-family: 'Pinyon Script', cursive; color: var(--gold); }

        /* FOG DARI FILE ANDA */
        .fog-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }
        .fog-img {
            position: absolute;
            width: 200%; height: 100%;
            background: url('fog.png') repeat-x;
            background-size: contain;
            opacity: 0.5;
            animation: moveFog 30s linear infinite;
        }
        @keyframes moveFog {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        #opening {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            text-align: center; background: var(--navy); position: fixed;
            width: 100%; z-index: 1000; transition: 1s ease-in-out;
        }

        .content-page { min-height: 100vh; padding: 60px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; }

        .glass-card {
            background: var(--white-trans); backdrop-filter: blur(10px);
            border: 1px solid var(--gold); padding: 35px 20px; border-radius: 20px;
            max-width: 500px; width: 100%; position: relative; margin-bottom: 20px;
        }

        /* ORNAMEN PASTI MUNCUL JIKA FILE ADA */
        .ornamen-bunga-corner {
            position: absolute; width: 60px; height: 60px; z-index: 15;
            background: url('bunga-jawa.png') no-repeat; background-size: contain;
        }
        .top-left { top: -10px; left: -10px; }
        .bottom-right { bottom: -10px; right: -10px; transform: rotate(180deg); }

        .btn-gold { background: var(--gold); color: var(--navy); border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        .circle-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; margin-bottom: 15px; }

        /* WEDDING WISH STYLE */
        #wish-form input, #wish-form textarea {
            width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none;
        }
        #wish-container {
            max-height: 300px; overflow-y: auto; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px;
        }
        .wish-item { border-bottom: 1px solid var(--gold); padding: 10px 0; }
        .wish-name { font-weight: bold; color: var(--gold); }
    </style>
</head>
<body style="overflow: hidden;">

    <audio id="weddingMusic" loop><source src="Lestari.mp3" type="audio/mpeg"></audio>

    <div class="fog-container"><div class="fog-img"></div></div>

    <section id="opening">
        <div data-aos="zoom-in">
            <h1 class="font-aesthetic" style="font-size: 4rem;">Trimono & Puji</h1>
            <div style="margin: 20px 0;">
                <p>Kepada Yth:</p>
                <h3 id="guest-name" class="font-aesthetic" style="font-size: 2rem;">Tamu Undangan</h3>
            </div>
            <button onclick="startInvitation()" class="btn-gold">Buka Undangan</button>
        </div>
    </section>

    <section class="content-page">
        <div class="glass-card" data-aos="fade-up">
            <div class="bunga-jawa-corner top-left"></div>
            <img src="WAYANG-KIRI.png" style="width: 80px; margin-bottom: 10px;">
            <h2 class="font-aesthetic" style="font-size: 3rem;">Trimono & Puji</h2>
            <p>28 MEI 2028</p>
            <div class="ornamen-bunga-corner bottom-right"></div>
        </div>
    </section>

    <section class="content-page">
        <div class="glass-card" data-aos="fade-up">
            <h2 class="font-aesthetic" style="font-size: 2.5rem;">Our Journey</h2>
            <img src="galeri1.jpg" style="width: 100%; border-radius: 10px; margin: 15px 0;">
            <p style="font-size: 0.9rem; line-height: 1.6;">Berawal dari sebuah pertemuan sederhana di tanah Ngawi, takdir membawa Trimono dan Puji dalam satu frekuensi yang sama. Perkenalan yang tenang namun pasti membawa kami pada komitmen suci ini.</p>
        </div>
    </section>

    <section class="content-page">
        <div class="glass-card" data-aos="fade-up">
            <h2 class="font-aesthetic" style="font-size: 2.5rem; margin-bottom: 20px;">Wedding Wishes</h2>
            <form id="wish-form">
                <input type="text" id="inputName" placeholder="Nama Anda" required>
                <textarea id="inputWish" placeholder="Berikan ucapan & doa restu..." rows="3" required></textarea>
                <button type="button" onclick="sendWish()" class="btn-gold" style="width: 100%;">Kirim Ucapan</button>
            </form>
            <hr style="margin: 20px 0; border: 0.5px solid var(--gold);">
            <div id="wish-container">
                </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // Ambil nama dari URL
        const params = new URLSearchParams(window.location.search);
        if(params.get('to')) document.getElementById('guest-name').innerText = params.get('to');

        function startInvitation() {
            document.getElementById('opening').style.transform = 'translateY(-100%)';
            document.getElementById('weddingMusic').play();
            document.body.style.overflow = "auto";
        }

        // FUNGSI WEDDING WISH (REAL-TIME SIMULATION)
        function sendWish() {
            const name = document.getElementById('inputName').value;
            const wish = document.getElementById('inputWish').value;
            
            if(name && wish) {
                const container = document.getElementById('wish-container');
                const html = `<div class="wish-item"><p class="wish-name">${name}</p><p>${wish}</p></div>`;
                container.innerHTML = html + container.innerHTML;
                
                // Reset Form
                document.getElementById('inputName').value = "";
                document.getElementById('inputWish').value = "";
                
                // Simpan ke database (Simulasi LocalStorage)
                let wishes = JSON.parse(localStorage.getItem('weddingWishes')) || [];
                wishes.push({name, wish});
                localStorage.setItem('weddingWishes', JSON.stringify(wishes));
            }
        }

        // Load Wishes on Start
        window.onload = function() {
            const container = document.getElementById('wish-container');
            let wishes = JSON.parse(localStorage.getItem('weddingWishes')) || [];
            wishes.reverse().forEach(data => {
                container.innerHTML += `<div class="wish-item"><p class="wish-name">${data.name}</p><p>${data.wish}</p></div>`;
            });
        }
    </script>
</body>
</html>
