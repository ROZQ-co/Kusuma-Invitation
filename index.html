<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
      transition: 1s;
    }

    /* Overlay gelap */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    /* Konten */
    .content {
      position: relative;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h2 {
      font-size: 22px;
      letter-spacing: 2px;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 45px;
      margin: 10px 0;
      animation: fadeIn 3s ease;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
      animation: fadeIn 4s ease;
    }

    /* Tombol */
    .btn {
      padding: 12px 30px;
      background: #c59d5f;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #a67c3c;
    }

    /* Animasi */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Mobile */
    @media (max-width: 600px) {
      h1 { font-size: 32px; }
      h2 { font-size: 18px; }
      p { font-size: 14px; }
    }
  </style>
</head>

<body>

  <!-- Video (SUDAH ADA AUDIO DI DALAMNYA) -->
  <video class="video-bg" autoplay muted loop id="bgVideo">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- Musik tambahan (opsional, bisa dihapus kalau tidak mau) -->
  <audio id="musik" loop>
    <source src="musik.mp3" type="audio/mp3">
  </audio>

  <!-- Konten -->
  <div class="content">
    <h2>The Wedding Of</h2>
    <h1>Trimono & Puji</h1>
    <p>Sabtu, 10 Mei 2026</p>

    <button class="btn" onclick="bukaUndangan()">Buka Undangan</button>
  </div>

  <script>
    function bukaUndangan() {
      // Aktifkan suara video
      let video = document.getElementById("bgVideo");
      video.muted = false;
      video.play();

      // Jalankan musik tambahan (opsional)
      let musik = document.getElementById("musik");
      musik.play().catch(() => {});

      // Hilangkan tombol (biar lebih elegan)
      document.querySelector(".btn").style.display = "none";
    }
  </script>

</body>
</html>
